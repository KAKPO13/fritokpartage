<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>FriTok Shop</title>

  <!-- Open Graph dynamique (rempli par JS) -->
  <meta property="og:type"        content="website" />
  <meta property="og:site_name"   content="FriTok" />
  <meta id="og-title"       property="og:title"       content="Boutique FriTok" />
  <meta id="og-description" property="og:description" content="Découvrez les produits en vidéo" />
  <meta id="og-image"       property="og:image"       content="https://fritok.net/og-default.jpg" />

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp }          from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, query, where, orderBy, getDocs }
                                      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // ─── Config Firebase (remplace par tes vraies valeurs) ───
    const firebaseConfig = {
      apiKey           : "AIzaSy_TON_API_KEY",
      authDomain       : "fritok-app.firebaseapp.com",
      projectId        : "fritok-app",
      storageBucket    : "fritok-app.appspot.com",
      messagingSenderId: "123456789",
      appId            : "1:123456789:web:abcdef",
    };

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);

    // ─── Lecture userId depuis l'URL ─────────────────────────
    const params = new URLSearchParams(location.search);
    const userId = params.get("userId") || params.get("sellerId");

    if (!userId) {
      document.getElementById("loader").innerHTML =
        `<p style="color:#ff6b00;font-size:1.1rem">Lien invalide — userId manquant.</p>`;
    } else {
      loadVideos(userId);
    }

    async function loadVideos(uid) {
      try {
        // Collection "shop_videos" filtrée par userId
        const q    = query(
          collection(db, "video_playlist"),
          where("userId", "==", uid),
          orderBy("createdAt", "desc")
        );
        const snap = await getDocs(q);

        if (snap.empty) {
          document.getElementById("loader").innerHTML =
            `<p style="color:#ff6b00">Aucune vidéo trouvée pour ce vendeur.</p>`;
          return;
        }

        const videos = snap.docs.map(d => ({ id: d.id, ...d.data() }));

        // Met à jour les meta OG avec le premier produit
        const first = videos[0];
        document.getElementById("og-title").content       =
          first.product?.name ?? first.title ?? "Boutique FriTok";
        document.getElementById("og-description").content =
          first.product?.description ?? "Découvrez nos produits en vidéo";
        document.getElementById("og-image").content       =
          first.product?.thumbnail ?? first.product?.image ?? "";
        document.title = first.product?.name ?? "Boutique FriTok";

        renderFeed(videos);
      } catch (err) {
        console.error(err);
        document.getElementById("loader").innerHTML =
          `<p style="color:#ff6b00">Erreur de chargement : ${err.message}</p>`;
      }
    }

    function renderFeed(videos) {
      const loader = document.getElementById("loader");
      const feed   = document.getElementById("feed");
      loader.style.display = "none";
      feed.style.display   = "block";

      videos.forEach((v, idx) => {
        const slide = document.createElement("div");
        slide.className = "slide";
        slide.dataset.index = idx;

        const price = v.product?.price
          ? `${Number(v.product.price).toLocaleString("fr-FR")} XOF`
          : "";

        slide.innerHTML = `
          <video
            class="bg-video"
            src="${v.videoUrl}"
            loop
            muted
            playsinline
            preload="metadata"
            poster="${v.product?.thumbnail || v.product?.image || ""}"
          ></video>

          <div class="gradient-top"></div>
          <div class="gradient-bot"></div>

          <div class="hud-top">
            <div class="logo-chip">
              <span class="dot"></span>FriTok
            </div>
          </div>

          <div class="hud-bot">
            <div class="product-info">
              <p class="product-name">${v.product?.name ?? v.title ?? ""}</p>
              <p class="product-desc">${v.product?.description ?? ""}</p>
              ${price ? `<p class="product-price">${price}</p>` : ""}
            </div>
          </div>

          <div class="side-rail">
            <button class="rail-btn like-btn" data-id="${v.id}" title="J'aime">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                   stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06
                         a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78
                         1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
              </svg>
              <span class="rail-count">${v.likes ?? 0}</span>
            </button>

            <button class="rail-btn" onclick="shareVideo('${v.product?.name ?? ""}','${location.href}')" title="Partager">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                   stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/>
                <circle cx="18" cy="19" r="3"/>
                <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
                <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
              </svg>
              <span class="rail-count">Partager</span>
            </button>

            <div class="product-thumb-wrap">
              <img
                class="product-thumb"
                src="${v.product?.image ?? v.product?.thumbnail ?? ""}"
                alt="${v.product?.name ?? ""}"
                onerror="this.style.display='none'"
              />
            </div>
          </div>

          <div class="play-overlay">
            <div class="play-icon">▶</div>
          </div>
        `;

        feed.appendChild(slide);

        // Lecture/pause au tap
        const video      = slide.querySelector(".bg-video");
        const playOverlay = slide.querySelector(".play-overlay");

        slide.addEventListener("click", (e) => {
          if (e.target.closest(".side-rail")) return;
          if (video.paused) {
            video.play();
            playOverlay.classList.remove("show");
          } else {
            video.pause();
            playOverlay.classList.add("show");
          }
        });
      });

      // Intersection Observer : lecture auto au scroll
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          const video = entry.target.querySelector(".bg-video");
          const overlay = entry.target.querySelector(".play-overlay");
          if (entry.isIntersecting) {
            video.play().catch(() => {});
            overlay.classList.remove("show");
          } else {
            video.pause();
          }
        });
      }, { threshold: 0.7 });

      document.querySelectorAll(".slide").forEach(s => observer.observe(s));

      // Like
      document.querySelectorAll(".like-btn").forEach(btn => {
        btn.addEventListener("click", (e) => {
          e.stopPropagation();
          btn.classList.toggle("liked");
          const count = btn.querySelector(".rail-count");
          count.textContent =
            btn.classList.contains("liked")
              ? parseInt(count.textContent) + 1
              : parseInt(count.textContent) - 1;
        });
      });
    }

    window.shareVideo = function(name, url) {
      if (navigator.share) {
        navigator.share({ title: name, url });
      } else {
        navigator.clipboard.writeText(url);
        alert("Lien copié !");
      }
    };
  </script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange    : #FF6B00;
      --orange-hot: #FF8C00;
      --zest      : #FFB700;
      --bg        : #0F0A00;
      --text1     : #FFF0DC;
      --textmuted : #AA906090;
      --glass     : rgba(15,5,0,.6);
      --border    : rgba(255,107,0,.25);
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
      color: var(--text1);
    }

    /* ── Loader ── */
    #loader {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 16px;
      background: var(--bg);
      z-index: 100;
    }

    .spinner {
      width: 44px; height: 44px;
      border: 3px solid rgba(255,107,0,.2);
      border-top-color: var(--orange);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loader-text {
      font-family: 'Syne', sans-serif;
      font-size: .85rem; letter-spacing: .12em;
      color: var(--textmuted);
    }

    /* ── Feed container ── */
    #feed {
      display: none;
      width: 100vw; height: 100dvh;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    #feed::-webkit-scrollbar { display: none; }

    /* ── Slide ── */
    .slide {
      position: relative;
      width: 100vw; height: 100dvh;
      scroll-snap-align: start;
      overflow: hidden;
      background: #080300;
    }

    /* ── Video background ── */
    .bg-video {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
    }

    /* ── Gradients ── */
    .gradient-top {
      position: absolute; top: 0; left: 0; right: 0; height: 180px;
      background: linear-gradient(to bottom,
        rgba(15,5,0,.8) 0%, transparent 100%);
      pointer-events: none;
    }
    .gradient-bot {
      position: absolute; bottom: 0; left: 0; right: 0; height: 55%;
      background: linear-gradient(to top,
        rgba(10,3,0,.95) 0%, rgba(10,3,0,.5) 50%, transparent 100%);
      pointer-events: none;
    }

    /* ── HUD top ── */
    .hud-top {
      position: absolute; top: env(safe-area-inset-top, 16px);
      left: 0; right: 0;
      display: flex; justify-content: center;
      padding: 12px 16px;
      pointer-events: none;
    }

    .logo-chip {
      display: flex; align-items: center; gap: 7px;
      background: rgba(0,0,0,.45);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 14px;
      font-family: 'Syne', sans-serif;
      font-weight: 800; font-size: .85rem;
      letter-spacing: .08em;
      color: var(--orange);
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--orange);
      box-shadow: 0 0 8px var(--orange);
      animation: pulse 1.2s ease infinite;
    }

    @keyframes pulse {
      0%,100% { opacity:1; transform: scale(1); }
      50%      { opacity:.4; transform: scale(.85); }
    }

    /* ── HUD bottom ── */
    .hud-bot {
      position: absolute; bottom: 0; left: 0;
      right: 90px;
      padding: 0 16px 40px;
    }

    .product-name {
      font-family: 'Syne', sans-serif;
      font-weight: 800; font-size: 1.15rem;
      line-height: 1.2;
      margin-bottom: 6px;
      text-shadow: 0 2px 12px rgba(0,0,0,.7);
    }

    .product-desc {
      font-size: .8rem;
      color: rgba(255,240,220,.7);
      line-height: 1.4;
      margin-bottom: 10px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .product-price {
      display: inline-block;
      background: linear-gradient(90deg, var(--orange), var(--orange-hot));
      padding: 5px 14px;
      border-radius: 20px;
      font-family: 'Syne', sans-serif;
      font-weight: 800; font-size: 1rem;
      box-shadow: 0 4px 18px rgba(255,107,0,.45);
    }

    /* ── Side rail ── */
    .side-rail {
      position: absolute;
      right: 10px; bottom: 36px;
      display: flex; flex-direction: column;
      align-items: center; gap: 20px;
    }

    .rail-btn {
      background: none; border: none; cursor: pointer;
      display: flex; flex-direction: column;
      align-items: center; gap: 4px;
      color: var(--text1);
    }

    .rail-btn svg {
      width: 28px; height: 28px;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,.6));
      transition: transform .15s;
    }

    .rail-btn:active svg { transform: scale(.85); }

    .rail-btn.liked svg { fill: #FF6B9D; stroke: #FF6B9D; }

    .rail-count {
      font-size: .65rem;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      color: rgba(255,240,220,.8);
      letter-spacing: .04em;
    }

    .product-thumb-wrap {
      width: 44px; height: 44px;
      border-radius: 10px;
      border: 2px solid var(--orange);
      overflow: hidden;
      box-shadow: 0 0 14px rgba(255,107,0,.4);
    }

    .product-thumb {
      width: 100%; height: 100%;
      object-fit: cover;
    }

    /* ── Play overlay ── */
    .play-overlay {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity .2s;
    }

    .play-overlay.show { opacity: 1; pointer-events: auto; }

    .play-icon {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: rgba(255,107,0,.25);
      border: 2px solid rgba(255,107,0,.6);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem; color: white;
      backdrop-filter: blur(4px);
    }

    /* ── Responsive desktop : centré comme TikTok ── */
    @media (min-width: 560px) {
      #feed {
        max-width: 400px;
        margin: 0 auto;
        box-shadow: 0 0 80px rgba(255,107,0,.08);
      }
    }
  </style>
</head>
<body>

  <div id="loader">
    <div class="spinner"></div>
    <p class="loader-text">CHARGEMENT DES VIDÉOS…</p>
  </div>

  <div id="feed"></div>

</body>
</html>
