<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FriTok — Vérification email</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #FFFBF5;
      --surface:     #FFFFFF;
      --orange:      #FF6B1A;
      --orange-dark: #E05510;
      --orange-soft: #FFF0E8;
      --text:        #1A1A1A;
      --muted:       #888880;
      --border:      #E8E0D8;
      --success-bg:  #EDF7ED;
      --success:     #2E7D32;
      --radius:      14px;
    }

    html, body { min-height:100%; font-family:'Plus Jakarta Sans',sans-serif; background:var(--bg); color:var(--text); }

    .page { display:flex; flex-direction:column; min-height:100vh; }

    /* ── Header ─────────────────────────────── */
    .header {
      background: var(--orange);
      padding: env(safe-area-inset-top,0) 28px 28px;
      padding-top: calc(env(safe-area-inset-top,0px) + 40px);
      animation: slideDown .5s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes slideDown { from { transform:translateY(-100%); opacity:0; } to { transform:translateY(0); opacity:1; } }
    .header-icon { width:44px; height:44px; background:rgba(255,255,255,.2); border-radius:12px; display:flex; align-items:center; justify-content:center; margin-bottom:14px; }
    .header-icon svg { width:24px; height:24px; color:#fff; }
    .header h1 { color:#fff; font-size:clamp(22px,7vw,30px); font-weight:800; letter-spacing:-.8px; line-height:1; }
    .header p  { color:rgba(255,255,255,.72); font-size:13px; margin-top:5px; }

    /* ── Body ───────────────────────────────── */
    .body { flex:1; padding:40px 28px 48px; display:flex; flex-direction:column; align-items:center; animation:fadeUp .5s .15s cubic-bezier(.22,1,.36,1) both; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

    /* ── Email icon pulse ───────────────────── */
    .email-icon-wrap {
      position:relative; width:96px; height:96px;
      display:flex; align-items:center; justify-content:center;
      margin-bottom:28px;
    }
    .pulse-ring {
      position:absolute; inset:0; border-radius:50%;
      background:rgba(255,107,26,.12);
      animation:pulse 2s ease-out infinite;
    }
    @keyframes pulse {
      0%   { transform:scale(.8); opacity:.8; }
      70%  { transform:scale(1.2); opacity:0; }
      100% { transform:scale(1.2); opacity:0; }
    }
    .email-icon-circle {
      position:relative; z-index:1;
      width:80px; height:80px; border-radius:50%;
      background:var(--orange-soft);
      display:flex; align-items:center; justify-content:center;
    }
    .email-icon-circle svg { width:40px; height:40px; color:var(--orange); }

    /* ── Info card ──────────────────────────── */
    .info-card {
      width:100%; background:var(--surface);
      border:1.5px solid var(--border); border-radius:16px;
      padding:22px; margin-bottom:24px; text-align:center;
    }
    .info-card .subtitle { font-size:14px; color:var(--muted); line-height:1.5; }
    .info-card .email-addr {
      font-size:15px; font-weight:700; color:var(--orange);
      margin:10px 0 16px; word-break:break-all;
    }
    .hint-box {
      display:flex; align-items:flex-start; gap:10px;
      background:var(--success-bg); border-radius:10px;
      padding:12px 14px; text-align:left;
    }
    .hint-box svg { width:18px; height:18px; color:var(--success); flex-shrink:0; margin-top:1px; }
    .hint-box p { font-size:13px; color:var(--success); line-height:1.45; }

    /* ── Alert ──────────────────────────────── */
    .alert { display:none; background:#FFF0E8; border:1.5px solid #FFD4B8; border-radius:12px; padding:12px 16px; margin-bottom:20px; font-size:13.5px; color:var(--orange-dark); line-height:1.45; width:100%; }
    .alert.show { display:block; }
    .alert.success { background:var(--success-bg); border-color:rgba(46,125,50,.3); color:var(--success); }

    /* ── Buttons ────────────────────────────── */
    .btn-primary {
      display:flex; align-items:center; justify-content:center; gap:8px;
      width:100%; height:54px;
      background:var(--orange); color:#fff;
      border:none; border-radius:var(--radius);
      font-family:inherit; font-size:16px; font-weight:700;
      letter-spacing:.3px; cursor:pointer;
      margin-bottom:14px;
      transition:background .2s, transform .1s;
    }
    .btn-primary:hover  { background:var(--orange-dark); }
    .btn-primary:active { transform:scale(.98); }
    .btn-primary:disabled { background:rgba(255,107,26,.45); cursor:not-allowed; }

    .btn-outline {
      display:flex; align-items:center; justify-content:center; gap:8px;
      width:100%; height:54px;
      background:transparent; color:var(--orange);
      border:1.5px solid var(--orange); border-radius:var(--radius);
      font-family:inherit; font-size:15px; font-weight:600;
      cursor:pointer;
      margin-bottom:32px;
      transition:border-color .2s, color .2s, background .2s;
    }
    .btn-outline:hover   { background:var(--orange-soft); }
    .btn-outline:disabled { border-color:var(--border); color:var(--muted); cursor:not-allowed; background:transparent; }

    /* ── Spinner ────────────────────────────── */
    .spinner { width:22px; height:22px; border:2.5px solid rgba(255,255,255,.35); border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; }
    .spinner-orange { width:22px; height:22px; border:2.5px solid rgba(255,107,26,.25); border-top-color:var(--orange); border-radius:50%; animation:spin .7s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* ── Cooldown progress ──────────────────── */
    .cooldown-bar-wrap { width:100%; height:3px; background:var(--border); border-radius:2px; margin-bottom:14px; overflow:hidden; display:none; }
    .cooldown-bar-wrap.show { display:block; }
    .cooldown-bar { height:100%; background:var(--orange); border-radius:2px; transition:width 1s linear; }

    /* ── Help text ──────────────────────────── */
    .help { text-align:center; width:100%; }
    .help p { font-size:13px; color:var(--muted); line-height:1.5; }
    .help p em { font-style:italic; }
    .switch-account {
      display:inline-block; margin-top:20px;
      font-size:13px; color:var(--muted);
      text-decoration:underline; cursor:pointer;
      background:none; border:none; font-family:inherit;
    }
    .switch-account:hover { color:var(--orange-dark); }
  </style>
</head>
<body>
<div class="page">

  <!-- Header -->
  <div class="header">
    <div class="header-icon">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M3 19v-8.93a2 2 0 01.89-1.664l7-4.666a2 2 0 012.22
             0l7 4.666A2 2 0 0121 10.07V19M3 19a2 2 0 002 2h14a2 2 0
             002-2M3 19l6.75-4.5M21 19l-6.75-4.5M3 10l6.75 4.5M21
             10l-6.75 4.5m0 0l-1.14.76a2 2 0 01-2.22 0l-1.14-.76"/>
      </svg>
    </div>
    <h1>Vérifiez votre email</h1>
    <p>Dernière étape avant de commencer</p>
  </div>

  <!-- Body -->
  <div class="body">

    <!-- Icon animée -->
    <div class="email-icon-wrap">
      <div class="pulse-ring"></div>
      <div class="email-icon-circle">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.7">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0
               002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>
      </div>
    </div>

    <!-- Alert -->
    <div id="alert" class="alert"></div>

    <!-- Info card -->
    <div class="info-card">
      <p class="subtitle">Un email de vérification a été envoyé à :</p>
      <p class="email-addr" id="user-email">—</p>
      <div class="hint-box">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <p>Cliquez sur le lien dans l'email, puis revenez ici appuyer sur le bouton.</p>
      </div>
    </div>

    <!-- Check button -->
    <button class="btn-primary" id="check-btn" type="button">
      J'ai vérifié mon email
    </button>

    <!-- Cooldown progress bar -->
    <div class="cooldown-bar-wrap" id="cooldown-wrap">
      <div class="cooldown-bar" id="cooldown-bar" style="width:100%"></div>
    </div>

    <!-- Resend button -->
    <button class="btn-outline" id="resend-btn" type="button">
      <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
      </svg>
      <span id="resend-label">Renvoyer l'email</span>
    </button>

    <!-- Help -->
    <div class="help">
      <p>Vous ne trouvez pas l'email ?</p>
      <p><em>Vérifiez vos spams ou courriers indésirables.</em></p>
      <button class="switch-account" id="switch-btn" type="button">
        Utiliser un autre compte
      </button>
    </div>

  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getAuth, onAuthStateChanged, signOut, sendEmailVerification, reload }
    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

  // ── 🔧 REMPLACEZ PAR VOS PROPRES CLÉS FIREBASE ──────────
  const firebaseConfig = {
    apiKey:            "VOTRE_API_KEY",
    authDomain:        "VOTRE_AUTH_DOMAIN",
    projectId:         "VOTRE_PROJECT_ID",
    storageBucket:     "VOTRE_STORAGE_BUCKET",
    messagingSenderId: "VOTRE_MESSAGING_SENDER_ID",
    appId:             "VOTRE_APP_ID",
  };
  // ─────────────────────────────────────────────────────────

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // ── Éléments ────────────────────────────────────────────
  const checkBtn     = document.getElementById('check-btn');
  const resendBtn    = document.getElementById('resend-btn');
  const switchBtn    = document.getElementById('switch-btn');
  const alertBox     = document.getElementById('alert');
  const userEmailEl  = document.getElementById('user-email');
  const resendLabel  = document.getElementById('resend-label');
  const cooldownWrap = document.getElementById('cooldown-wrap');
  const cooldownBar  = document.getElementById('cooldown-bar');

  let currentUser = null;
  let cooldownTimer = null;
  const COOLDOWN_SEC = 30;

  // ── Attente de l'utilisateur connecté ───────────────────
  onAuthStateChanged(auth, (user) => {
    if (!user) {
      window.location.href = 'login.html';
      return;
    }
    currentUser = user;
    userEmailEl.textContent = user.email;

    // Si déjà vérifié, rediriger
    if (user.emailVerified) {
      window.location.href = 'index.html'; // Changez selon votre page principale
    }
  });

  // ── Alert helpers ────────────────────────────────────────
  function showAlert(msg, success = false) {
    alertBox.textContent = msg;
    alertBox.className = 'alert show' + (success ? ' success' : '');
  }
  function clearAlert() { alertBox.className = 'alert'; }

  // ── Vérifier l'email ─────────────────────────────────────
  checkBtn.addEventListener('click', async () => {
    if (!currentUser) return;
    clearAlert();
    checkBtn.disabled = true;
    checkBtn.innerHTML = '<div class="spinner"></div>';

    try {
      await reload(currentUser);

      if (currentUser.emailVerified) {
        showAlert('✅ Email vérifié avec succès ! Redirection...', true);
        setTimeout(() => { window.location.href = 'index.html'; }, 1500);
      } else {
        showAlert("Email non encore vérifié. Cliquez sur le lien dans l'email, puis réessayez.");
      }
    } catch {
      showAlert("Erreur lors de la vérification. Vérifiez votre connexion.");
    } finally {
      checkBtn.disabled = false;
      checkBtn.innerHTML = "J'ai vérifié mon email";
    }
  });

  // ── Renvoyer l'email ──────────────────────────────────────
  resendBtn.addEventListener('click', async () => {
    if (!currentUser || resendBtn.disabled) return;
    clearAlert();
    resendBtn.disabled = true;
    resendBtn.innerHTML = '<div class="spinner-orange"></div>';

    try {
      await sendEmailVerification(currentUser);
      showAlert(`✅ Email renvoyé à ${currentUser.email}. Vérifiez vos spams.`, true);
      startCooldown();
    } catch (err) {
      const msg = err.code === 'auth/too-many-requests'
        ? 'Trop de tentatives. Réessayez dans quelques minutes.'
        : "Erreur lors de l'envoi. Réessayez.";
      showAlert(msg);
      resendBtn.disabled = false;
    } finally {
      resendBtn.innerHTML = `
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
        </svg>
        <span id="resend-label">Renvoyer l'email</span>`;
    }
  });

  // ── Cooldown 30s ─────────────────────────────────────────
  function startCooldown() {
    let remaining = COOLDOWN_SEC;
    resendBtn.disabled = true;
    cooldownWrap.classList.add('show');

    // Mise à jour instantanée du label
    updateLabel(remaining);
    cooldownBar.style.width = '100%';

    clearInterval(cooldownTimer);
    cooldownTimer = setInterval(() => {
      remaining--;
      updateLabel(remaining);

      const pct = (remaining / COOLDOWN_SEC) * 100;
      cooldownBar.style.width = pct + '%';

      if (remaining <= 0) {
        clearInterval(cooldownTimer);
        resendBtn.disabled = false;
        cooldownWrap.classList.remove('show');
        const lbl = document.getElementById('resend-label');
        if (lbl) lbl.textContent = "Renvoyer l'email";
      }
    }, 1000);
  }

  function updateLabel(sec) {
    // Re-find the label since innerHTML was replaced
    const lbl = resendBtn.querySelector('span') || resendBtn;
    const el = document.getElementById('resend-label') || lbl;
    if (el) el.textContent = sec > 0 ? `Renvoyer dans ${sec} s` : "Renvoyer l'email";
  }

  // ── Changer de compte ─────────────────────────────────────
  switchBtn.addEventListener('click', async () => {
    clearInterval(cooldownTimer);
    try { await signOut(auth); } catch {}
    window.location.href = 'login.html';
  });
</script>
</body>
</html>
