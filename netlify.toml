[build]
  command = "npm run build"
  publish = ".next"
  functions = "netlify/functions"

  [build.environment]
  NODE_VERSION = "20.19.0"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[dev]
  command = "npm run dev"
  port = 8888
  framework = "next"

# ==============================
# 🔁 REDIRECTIONS (Next.js + API)
# ==============================

[[redirects]]
  from = "/share/:videoId"
  to = "/.netlify/functions/share"
  status = 200
  force = true

# ==============================
# ⏰ CRON – LIVE AVATAR PROGRAMMÉ
# ==============================

[[scheduled]]
  path = "/.netlify/functions/startScheduledLives"
  schedule = "*/1 * * * *"
