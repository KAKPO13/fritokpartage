[build]
  command = "npm run build -- --webpack"
  publish = ".next"
  functions = "netlify/functions"

  [build.environment]
  NODE_VERSION = "20.19.0"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[dev]
  command = "npm run dev"
  port = 8888
  framework = "next"

# ==============================
# 🔁 REDIRECTIONS (Next.js + API)
# ==============================

[[redirects]]
  from = "/share/:videoId"
  to = "/.netlify/functions/share"
  status = 200
  force = true

  # Callback Flutterwave (si besoin d'alias court)
[[redirects]]
  from   = "/seller/subscribe/success"
  to     = "/seller/subscribe/callback?status=successful"
  status = 200
 
[[redirects]]
  from   = "/seller/subscribe/cancel"
  to     = "/seller/subscribe/callback?status=cancelled"
  status = 200

# ==============================
# ⏰ CRON – LIVE AVATAR PROGRAMMÉ
# ==============================

[[scheduled]]
  path = "/.netlify/functions/startScheduledLives"
  schedule = "*/1 * * * *"
  # CRON – exécution chaque minute

  # ── Cron : expire les abonnements chaque jour à 02h UTC ──────
[functions."expire-subscriptions"]
  schedule = "0 2 * * *"


# ── Headers de sécurité ──────────────────────────────────────
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"

   
# Déclenche check-rental-alerts toutes les 5 minutes

[functions."check-rental-alerts"]
  schedule = "*/5 * * * *"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
