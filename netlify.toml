[build]
  command   = "npm run build -- --webpack"
  publish   = ".next"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20.19.0"

  # ══════════════════════════════════════════════════════════════════════════
  # Variables NEXT_PUBLIC_* — build-only, inlinées côté client par Next.js.
  # Déclarées ici (et non dans l'UI Netlify) car les variables définies dans
  # netlify.toml ont le scope "Builds" et ne sont JAMAIS injectées dans les
  # Netlify Functions au runtime. Ça les sort complètement du calcul de la
  # limite de 4 Ko imposée par AWS Lambda sur les Functions.
  # Aucun risque de sécurité supplémentaire : ces clés sont déjà publiques
  # (préfixe NEXT_PUBLIC_ = exposées dans le bundle JS livré au navigateur).
  # ⚠️ Remplace les "..." ci-dessous par les valeurs actuelles (copie-les
  # depuis l'UI Netlify AVANT de les supprimer de là-bas).
  NEXT_PUBLIC_AGORA_APP_ID                 = "5bbfd51877e2435f87afef0f89cebda3"
  NEXT_PUBLIC_API_BASE                     = "https://fritok.net"
  NEXT_PUBLIC_EXCHANGE_API_KEY             = "fe6bfd790c7c81d6ca3e5e9a"
  NEXT_PUBLIC_FIREBASE_APP_ID              = "1:463987328508:web:dc6c86e684a04b45739e79"
  NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN         = "cgsp-app.firebaseapp.com"
  NEXT_PUBLIC_FIREBASE_DATABASE_URL        = "https://cgsp-app-default-rtdb.europe-west1.firebasedatabase.app"
  NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID      = "G-R5MKMQKBWH"
  NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID = "463987328508"
  NEXT_PUBLIC_FIREBASE_PROJECT_ID          = "cgsp-app"
  NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET      = "cgsp-app.appspot.com"
  NEXT_PUBLIC_FIREBASE_VAPID_KEY           = "BP0z79QPwacaPKYtjr7oybdryZmIdjLE2dxKaEFtPEV18Ts8unM0IeY0Ahy_WVDHTMzDohFRqLbvqfIZ8SkZmnY"
  NEXT_PUBLIC_FUNCTIONS_URL                = "https://fritok.net/.netlify/functions"


[[plugins]]
  package = "@netlify/plugin-nextjs"

[dev]
  command   = "npm run dev"
  port      = 8888
  framework = "next"

# ══════════════════════════════════════════════════════════════════════════════
# 🔒 HEADERS DE SÉCURITÉ — Pages web
# ══════════════════════════════════════════════════════════════════════════════
[[headers]]
  for = "/*"
  [headers.values]
    # Empêche le clickjacking
    X-Frame-Options = "DENY"

    # Empêche le MIME sniffing
    X-Content-Type-Options = "nosniff"

    # Force HTTPS pour 1 an, incluant sous-domaines
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

    # Contrôle le Referer envoyé aux tiers
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Désactive les APIs navigateur non utilisées
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self), payment=()"

    # ── Content Security Policy ───────────────────────────────────────────────
    # Adapte les domaines selon tes intégrations réelles
    # Mode "strict" : démarre en report-only pour valider, puis retire le préfixe
    #
    # 🆕 KkiaPay — 3 ajouts nécessaires pour que le widget de paiement
    # fonctionne (script-src pour k.js, frame-src pour l'iframe de paiement
    # hébergée sur widget.kkiapay.me, connect-src par précaution) :
    Content-Security-Policy = '''
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval'
        https://www.gstatic.com
        https://www.googleapis.com
        https://cdn.jsdelivr.net
        https://unpkg.com
        https://cdn.kkiapay.me;
      style-src 'self' 'unsafe-inline'
        https://fonts.googleapis.com;
      font-src 'self'
        https://fonts.gstatic.com;
      img-src 'self' data: blob:
        https://firebasestorage.googleapis.com
        https://storage.googleapis.com
        https://lh3.googleusercontent.com;
      connect-src 'self'
        https://*.firebaseapp.com
        https://*.googleapis.com
        https://firestore.googleapis.com
        https://firebase.googleapis.com
        https://identitytoolkit.googleapis.com
        https://securetoken.googleapis.com
        https://api.flutterwave.com
        https://api.exchangerate-api.com
        https://api.africa-sms.com
        https://api.kkiapay.me
        wss://*.firebaseio.com;
      frame-src https://widget.kkiapay.me;
      object-src 'none';
      base-uri 'self';
      form-action 'self';
      upgrade-insecure-requests;
    '''

# ══════════════════════════════════════════════════════════════════════════════
# 🔒 HEADERS — Netlify Functions (API)
# ══════════════════════════════════════════════════════════════════════════════
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    # CORS restreint : UNIQUEMENT fritok.net
    # Le header dynamique Access-Control-Allow-Origin doit être géré dans
    # chaque Function (voir patch ci-dessous) — ce header statique sert
    # de fallback pour les requêtes sans Origin valide.
    Access-Control-Allow-Origin = "https://fritok.net"

# ══════════════════════════════════════════════════════════════════════════════
# 🔒 HEADERS — Service Worker (pas de cache)
# ══════════════════════════════════════════════════════════════════════════════
[[headers]]
  for = "/sw-fritok.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ══════════════════════════════════════════════════════════════════════════════
# 🔁 REDIRECTIONS
# ══════════════════════════════════════════════════════════════════════════════
[[redirects]]
  from   = "/share/:videoId"
  to     = "/.netlify/functions/share"
  status = 200
  force  = true

[[redirects]]
  from   = "/seller/subscribe/success"
  to     = "/seller/subscribe/callback?status=successful"
  status = 200

[[redirects]]
  from   = "/seller/subscribe/cancel"
  to     = "/seller/subscribe/callback?status=cancelled"
  status = 200

# ══════════════════════════════════════════════════════════════════════════════
# ⏰ CRON
# ══════════════════════════════════════════════════════════════════════════════
[[scheduled]]
  path     = "/.netlify/functions/startScheduledLives"
  schedule = "*/1 * * * *"

[functions."expire-subscriptions"]
  schedule = "0 2 * * *"

[functions."check-rental-alerts"]
  schedule = "*/5 * * * *"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["firebase-admin"]